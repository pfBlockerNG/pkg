name: Publish pfBlockerNG pkg repository

# Self-contained publisher for the pfBlockerNG self-hosted FreeBSD `pkg`
# repository (ADR-17/ADR-20). It lives in pfBlockerNG/pkg so it deploys to THIS
# repo's GitHub Pages — served at https://pfblockerng.github.io/pkg — via the
# same-repo OIDC actions/deploy-pages. No deploy key, no cross-repo secret:
# everything it needs from pfBlockerNG/pfBlockerNG (and the ports tree) is PUBLIC,
# used with this repo's own GITHUB_TOKEN.
#
# THE BRAIN IS THE SCRIPT (ADR-20 routing rework). This workflow no longer hand-
# loops the per-ABI builds, the nightly prune, or the catalog generation. It reads
# the SOURCE repo's BUILD matrix and hands it to scripts/build-repo-portable.py
# --build-matrix, which drives the DUMB scripts/build-pkg-portable.py per
# (entry × channel) and projects the matrix 1:1 onto the tree:
#
#   release/<variant>-<major.minor>/<arch>/   (devel + stable, one catalog)
#   nightly/<variant>-<major.minor>/<arch>/   (nightly only, retained to 14)
#
# CONTENT (ADR-20 D3 — the release/ subtree is CONSUMED, not rebuilt):
#   * devel — SERVED FROM the latest prerelease (alpha/beta/rc) Release's .pkg assets.
#   * stable — SERVED FROM the latest stable (non-prerelease) Release's .pkg assets.
#     Both are built ONCE by pfBlockerNG/pfBlockerNG's release.yml (full matrix) and
#     downloaded here, mapped to release/<varver>/<arch>/ by the variant slug in each
#     filename. Either channel absent → that catalog is simply empty until a Release
#     exists (no stable release of this fork yet → production stays empty).
#   * nightly — the ONLY fresh build here: a SEPARATE package from devel HEAD, folded in
#     with the retained prior nightlies (restored from an Actions cache) and pruned to 14.
# The catalog is a DERIVED, fully-regenerated index — stateless + idempotent.
#
# TRIGGERS:
#   * workflow_dispatch — manual, AND fired by pfBlockerNG/pfBlockerNG's release.yml
#     (after the Release assets are attached) so a new release publishes here in seconds.
#   * schedule — a daily backstop that refreshes the nightly build and re-consumes the
#     latest Releases (idempotent for release/).

on:
  workflow_dispatch:
    inputs:
      build_branch_pkg:
        description: "Build the devel + nightly .pkg and fold them in (default true)."
        type: boolean
        default: true
  schedule:
    - cron: "0 6 * * *"

# Least privilege: read to checkout + read public releases; the Pages OIDC deploy
# pair is the only elevation.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; never cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

# The pfSense ports tree the portable builders read (USE_GITHUB layout). The
# per-entry TARGET facts (FreeBSD major, arch, php, py flavor, variant, status)
# come from the SOURCE repo's BUILD matrix at runtime, NOT pinned here.
env:
  PORTS_REPO: "pfBlockerNG/FreeBSD-ports"
  PORTS_REF: "pfblockerng/use-github"
  SRC_REPO: "pfBlockerNG/pfBlockerNG"

jobs:
  publish:
    name: Build the variant tree + deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout the pfBlockerNG source (generator + builder + tree)
        uses: actions/checkout@v6
        with:
          repository: pfBlockerNG/pfBlockerNG
          ref: devel
          path: pfblockerng
          # No history needed — we only use the working tree (scripts + src) and HEAD.
          # As the source repo grows, a full clone gets slower; keep this a single commit.
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Ensure the zstd encoder is present
        # Both portable scripts need a zstd ENCODER (the `zstd` binary or the
        # python `zstandard` module). ubuntu-latest may not ship it — install it.
        run: command -v zstd >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y zstd; }

      - name: Read the BUILD matrix (every (version, arch) entry)
        # The SOURCE repo owns the supported-version matrix on its ci-metadata orphan
        # ref; read-version-matrix.sh resolves it (each entry carries a resolved
        # `arch`, default amd64). Fetch ci-metadata into a tracking ref first — a
        # single-branch checkout only has `devel`. The brain consumes the full entry
        # (pfsense_version/variant/freebsd_major/arch/php_version/py_flavor/status);
        # the landing page (gen_landing.py --matrix) consumes the same array.
        id: matrix
        run: |
          set -euo pipefail
          # --depth 1: read-version-matrix.sh only reads supported-versions.json at the
          # ref tip; no ci-metadata history is needed, so don't fetch it.
          git -C pfblockerng fetch --no-tags --depth 1 origin \
            '+refs/heads/ci-metadata:refs/remotes/origin/ci-metadata'
          ( cd pfblockerng && sh scripts/read-version-matrix.sh --print-build ) \
            | jq -c '.' > matrix.json
          jq -e 'length > 0' matrix.json >/dev/null \
            || { echo "::error::BUILD matrix resolved to zero targets"; exit 1; }
          # ROUTE matrix = build ∪ route-only (ADR-27 Part 2). The brain consumes THIS
          # (route-only entries emit a frozen catalog, no build/nightly); --print-route
          # == --print-build until a version is flagged route-only, so this is inert today.
          ( cd pfblockerng && sh scripts/read-version-matrix.sh --print-route ) \
            | jq -c '.' > route_matrix.json
          # gen_landing.py --matrix wants the per-entry fields keyed by resolved ABI.
          # Built from the ROUTE matrix + role, so the landing page's "EOL pfSense
          # versions" tables (role=="route-only") render; role is absent today.
          jq -c '[ .[] | {
              abi: "FreeBSD:\(.freebsd_major):\(.arch)",
              pfsense_version: .pfsense_version,
              variant: .variant,
              php_version: .php_version,
              py_flavor: .py_flavor,
              role: (.role // "build")
            } ]' route_matrix.json > landing_matrix.json
          echo "--- BUILD targets ---"
          jq -r '.[] | "\(.variant) \(.pfsense_version) FreeBSD:\(.freebsd_major):\(.arch) php=\(.php_version) \(.py_flavor) [\(.status)]"' matrix.json
          echo "--- ROUTE-ONLY (EOL) targets ---"
          jq -r '[ .[] | select(.role == "route-only") ] | if length == 0 then "(none)" else .[] | "\(.variant) \(.pfsense_version) [route-only]" end' route_matrix.json

      - name: Clone the FreeBSD-ports tree (blobless + sparse, ~12x faster)
        # The nightly is built from ONE ports tree for every matrix leg, so sparse-checkout
        # the UNION of build origins across each distinct (php, py-flavor) in the matrix
        # (CE php8.3, Plus php8.5, ...). Reuses the SOURCE repo's shared sparse-clone helper +
        # build-pkg-portable.py --print-build-origins — the single source of truth for "which
        # port dirs a build reads" — so this can never drift from how the .pkg is actually
        # built. Drops the clone from ~1.3 GB/~37 s (full tree) to ~30 MB/~3 s; the built .pkg
        # is byte-identical.
        run: |
          set -euo pipefail
          PORTS="${RUNNER_TEMP}/ports"
          first=1
          jq -r '.[] | "\(.php_version):\(.py_flavor)"' matrix.json | sort -u \
          | while IFS=: read -r php py; do
              if [ "$first" = 1 ]; then
                # First leg: blobless+no-checkout clone + sparse-checkout the nightly port
                # and this leg's deps, via the shared helper.
                sh pfblockerng/scripts/sparse-clone-ports.sh \
                  "https://github.com/${PORTS_REPO}" "$PORTS_REF" "$PORTS" nightly "$php" "$py"
                first=0
              else
                # Subsequent legs: add this leg's deps to the same sparse tree.
                origins="$(python3 pfblockerng/scripts/build-pkg-portable.py \
                  --print-build-origins --ports "$PORTS" --channel nightly --php "$php" --py-flavor "$py")"
                # shellcheck disable=SC2086  # origins are a whitespace-separated dir list
                git -C "$PORTS" sparse-checkout add $origins
              fi
            done

      - name: Download Release .pkg assets (latest stable + latest prerelease)
        # ADR-20 D3 rework: the release/<varver>/<arch>/ catalog is SERVED FROM the GitHub
        # Release .pkg assets (built once by pfBlockerNG/pfBlockerNG's release.yml), no longer
        # rebuilt here. Download the newest stable (non-prerelease) Release → stable channel,
        # and the newest prerelease Release → devel channel. Map each asset to its catalog dir
        # via the variant slug encoded in its filename
        # (…-<variant>-<major.minor>-FreeBSD-<major>-<arch>.pkg) and hand them to the brain as
        # --release-pkgs <varver>:<path>; retain_by_channel keeps the newest devel + newest
        # stable per (varver, arch). Either channel absent → simply not served yet (empty pool
        # is a warn+skip in the brain). Nightly is STILL built fresh from devel HEAD below.
        id: release-pkgs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ARGS_FILE="${RUNNER_TEMP}/release_pkgs_args"
          : > "$ARGS_FILE"
          DL_ROOT="${RUNNER_TEMP}/release_assets"
          mkdir -p "$DL_ROOT"

          # Newest non-prerelease (stable) + newest prerelease tag. --jq runs PER PAGE under
          # --paginate, so slurp (`jq -s 'add'`) into one array before sorting globally. Sort by
          # published_at (the actual publish time), falling back to created_at (the commit date)
          # for any release that lacks it — created_at alone can mis-order a late-published draft.
          RELEASES_JSON="$(gh api "repos/${SRC_REPO}/releases" --paginate | jq -s 'add')"
          STABLE_TAG="$(printf '%s' "$RELEASES_JSON" \
            | jq -r 'map(select(.prerelease==false and .draft==false)) | sort_by(.published_at // .created_at) | last | .tag_name // empty')"
          PRERELEASE_TAG="$(printf '%s' "$RELEASES_JSON" \
            | jq -r 'map(select(.prerelease==true  and .draft==false)) | sort_by(.published_at // .created_at) | last | .tag_name // empty')"
          echo "Stable Release:     ${STABLE_TAG:-<none>}"
          echo "Prerelease Release: ${PRERELEASE_TAG:-<none>}"

          # Download both channels' .pkg assets (the source tar.gz never matches *.pkg), then
          # map each to its varver and emit a --release-pkgs arg. Pre-check the asset list so a
          # genuine absence is a warn+skip, while a transient download failure (network/auth)
          # fails the step (set -e) instead of being silently swallowed as "no assets".
          for TAG in "$STABLE_TAG" "$PRERELEASE_TAG"; do
            [ -n "$TAG" ] || continue
            DEST="${DL_ROOT}/${TAG}"
            mkdir -p "$DEST"
            PKG_COUNT="$(gh release view "$TAG" --repo "${SRC_REPO}" --json assets \
              --jq '[.assets[] | select(.name | endswith(".pkg"))] | length')"
            if [ "${PKG_COUNT}" -eq 0 ]; then
              echo "::warning::no .pkg assets in Release ${TAG}"
              continue
            fi
            gh release download "$TAG" --repo "${SRC_REPO}" --pattern '*.pkg' --dir "$DEST"
            for PKG in "$DEST"/*.pkg; do
              [ -e "$PKG" ] || continue
              BASE="$(basename "$PKG")"
              # Variant slug = the <ce|plus>-<major.minor> segment immediately before -FreeBSD-.
              VARVER="$(printf '%s' "$BASE" \
                | sed -nE 's/.*-((ce|plus)-[0-9]+\.[0-9]+)-FreeBSD-[0-9]+-(amd64|aarch64)\.pkg$/\1/p')"
              if [ -z "$VARVER" ]; then
                echo "::warning::cannot parse a variant slug from ${BASE} — skipping"
                continue
              fi
              printf ' --release-pkgs %s:%s' "$VARVER" "$PKG" >> "$ARGS_FILE"
            done
          done
          echo "args=$(cat "$ARGS_FILE")" >> "$GITHUB_OUTPUT"
          echo "release-pkgs args:$(cat "$ARGS_FILE")"

      - name: Download frozen .pkg for route-only (EOL) pfSense versions
        # ADR-27 Part 2. A route-only matrix entry (role=="route-only") is an EOL pfSense
        # version no longer built/smoked but still SERVED from its last .pkg. For each, pull
        # that version's last Release assets (the matrix `last_tag`) and hand them to the
        # brain as --route-only-pkgs <varver>:<path>. The brain emits a frozen catalog from
        # them (no build, no nightly). NO-OP today: there are no route-only entries, so this
        # emits an empty arg string and the brain behaves exactly as before.
        id: route-only
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ARGS_FILE="${RUNNER_TEMP}/route_only_args"
          : > "$ARGS_FILE"
          COUNT="$(jq '[ .[] | select(.role == "route-only") ] | length' route_matrix.json)"
          if [ "$COUNT" -eq 0 ]; then
            echo "No route-only (EOL) entries — nothing to download."
            echo "args=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # NOTE: iterate via a here-string (process substitution), NOT a pipe into `while`,
          # so the loop body runs in THIS shell — a `cmd | while` subshell would lose state.
          while IFS= read -r entry; do
            [ -n "$entry" ] || continue
            PFSENSE_VER="$(printf '%s' "$entry" | jq -r '.pfsense_version')"
            VARIANT="$(printf '%s' "$entry" | jq -r '.variant')"
            LAST_TAG="$(printf '%s' "$entry" | jq -r '.last_tag // empty')"
            MAJOR_MINOR="$(printf '%s' "$PFSENSE_VER" | cut -d. -f1-2)"
            VARVER="$(printf '%s' "$VARIANT" | tr '[:upper:]' '[:lower:]')-${MAJOR_MINOR}"
            if [ -z "$LAST_TAG" ]; then
              echo "::error::route-only entry ${VARVER} has no last_tag — cannot fetch its frozen .pkg"
              exit 1
            fi
            ASSET_DIR="${RUNNER_TEMP}/frozen/${VARVER}"
            mkdir -p "$ASSET_DIR"
            gh release download "$LAST_TAG" --repo "${SRC_REPO}" --pattern '*.pkg' --dir "$ASSET_DIR"
            for PKG_FILE in "$ASSET_DIR"/*.pkg; do
              [ -e "$PKG_FILE" ] || { echo "::error::no .pkg in Release ${LAST_TAG} for ${VARVER}"; exit 1; }
              printf ' --route-only-pkgs %s:%s' "$VARVER" "$PKG_FILE" >> "$ARGS_FILE"
            done
          done <<EOF
          $(jq -c '.[] | select(.role == "route-only")' route_matrix.json)
          EOF
          echo "args=$(cat "$ARGS_FILE")" >> "$GITHUB_OUTPUT"
          echo "route-only args: $(cat "$ARGS_FILE")"

      - name: Restore the nightly retention store (last 14 builds per subtree)
        # ADR-18 retention via a same-repo Actions cache (no token). The cache holds the
        # built nightly subtrees (site/nightly/<varver>/<arch>/*.pkg); the brain folds the
        # fresh nightly in and prunes to 14. Rolling-cache idiom: a unique per-run key
        # ALWAYS saves; restore-keys (a prefix) grabs the most recent prior store.
        # ALWAYS restore — even on a build_branch_pkg=false dispatch (which builds the
        # release tree with --no-nightly): the restored site/nightly must be present in
        # the deployed artifact, or the Pages deploy would WIPE the live nightly channel.
        uses: actions/cache/restore@v4
        with:
          path: site/nightly
          key: nightly-store-${{ github.run_id }}
          restore-keys: |
            nightly-store-

      - name: Build the variant tree (the brain)
        # scripts/build-repo-portable.py --build-matrix lays out release/ + nightly/ and
        # prunes the nightly subtrees to 14. The release/ catalog is
        # SERVED from the downloaded Release .pkg assets (--release-pkgs); only NIGHTLY is
        # built fresh here (from devel HEAD via --local-src), versioned
        # <target>.YYYYMMDD.<seq> (pkg-safe, monotonic; target = the -nightly port
        # PORTVERSION). The commit + created annotations are stamped on every build for the
        # landing page (the consumed Release .pkg already carry their own annotations).
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_branch_pkg }}
        run: |
          set -euo pipefail
          SHA="$(git -C pfblockerng rev-parse HEAD)"
          CREATED="$(git -C pfblockerng show -s --format=%ct HEAD)"
          TARGET="$(sed -n 's/^PORTVERSION=[[:space:]]*//p' \
            "${RUNNER_TEMP}/ports/net/pfSense-pkg-pfBlockerNG-nightly/Makefile" | head -1)"
          [ -n "$TARGET" ] || { echo "::error::could not read the -nightly port PORTVERSION"; exit 1; }
          # The final version component is a SAME-DATE sequence: it disambiguates multiple
          # nightlies built on the same date (first of the day = .1, a second same-day build
          # = .2, ...), and resets each date (the YYYYMMDD component already orders across
          # days). Derive it from the restored retention store: the highest existing
          # <name>-<...>.<DATE>.<N>.pkg, plus one (1 when none exists for today).
          DATE="$(date -u +%Y%m%d)"
          SEQ=1
          if [ -d site/nightly ]; then
            LAST="$(find site/nightly -type f -name "*.${DATE}.*.pkg" 2>/dev/null \
              | sed -nE "s/.*\.${DATE}\.([0-9]+)\.pkg\$/\1/p" | sort -n | tail -1)"
            [ -z "$LAST" ] || SEQ="$((LAST + 1))"
          fi
          VER="${TARGET}.${DATE}.${SEQ}"
          # release/ is consumed from the Release assets; route-only entries serve a frozen
          # .pkg (no build, no nightly). Both arg strings are empty until populated.
          RELEASE_PKGS_ARGS="${{ steps.release-pkgs.outputs.args }}"
          ROUTE_ONLY_ARGS="${{ steps.route-only.outputs.args }}"
          # shellcheck disable=SC2086
          python3 pfblockerng/scripts/build-repo-portable.py --build-matrix \
            --matrix-json route_matrix.json \
            --out site \
            --ports "${RUNNER_TEMP}/ports" \
            --local-src pfblockerng \
            --nightly-pkgversion "$VER" \
            --nightly-keep 14 \
            --annotate "commit=${SHA}" \
            --annotate "created=${CREATED}" \
            $ROUTE_ONLY_ARGS \
            $RELEASE_PKGS_ARGS
          echo "--- Published site tree ---"
          find site -type f | sort

      - name: Build the release tree ONLY (manual dispatch, builds skipped)
        # A manual dispatch can opt out of the nightly build (build_branch_pkg=false) to just
        # regenerate the consumed release/ catalog without touching the nightly
        # store. Uses --no-nightly so the cached nightlies are neither read nor pruned here;
        # release/ is still served from the downloaded Release assets (--release-pkgs).
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.build_branch_pkg }}
        run: |
          set -euo pipefail
          SHA="$(git -C pfblockerng rev-parse HEAD)"
          CREATED="$(git -C pfblockerng show -s --format=%ct HEAD)"
          RELEASE_PKGS_ARGS="${{ steps.release-pkgs.outputs.args }}"
          ROUTE_ONLY_ARGS="${{ steps.route-only.outputs.args }}"
          # shellcheck disable=SC2086
          python3 pfblockerng/scripts/build-repo-portable.py --build-matrix \
            --matrix-json route_matrix.json \
            --out site \
            --ports "${RUNNER_TEMP}/ports" \
            --local-src pfblockerng \
            --no-nightly \
            --annotate "commit=${SHA}" \
            --annotate "created=${CREATED}" \
            $ROUTE_ONLY_ARGS \
            $RELEASE_PKGS_ARGS
          find site -type f | sort

      - name: Save the nightly retention store
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_branch_pkg }}
        uses: actions/cache/save@v4
        with:
          path: site/nightly
          key: nightly-store-${{ github.run_id }}

      - name: Render the human landing page + per-directory indexes
        # The source repo's scripts/gen_landing.py renders the styled index OVER the
        # machine catalog: channel install cards (stable/devel/nightly), a Version × ABI
        # table read from each .pkg's MANIFEST (layout-agnostic — it walks the tree and
        # reads ABI/channel from the package, so the release/<varver>/<arch>/ layout needs
        # no change), and per-dir listings. pkg(8) never reads these pages.
        #
        # The base-URL arg is the CLIENT bootstrap/conf base — the direct GitHub Pages
        # origin (ADR-39; the Cloudflare Worker has been retired). add-repo.sh resolves
        # the per-box conf URL as <base>/<channel>/<varver>/<arch>, regenerated at boot
        # by the rc.d hook on a pfSense OS upgrade. The landing page's bootstrap one-liner
        # and manual-conf snippet both derive from this base.
        run: |
          set -eu
          python3 pfblockerng/scripts/gen_landing.py \
            site "https://pfblockerng.github.io/pkg" pfblockerng/scripts/add-repo.sh \
            --matrix landing_matrix.json
          # .nojekyll: serve the tree verbatim (no Jekyll stripping of _-prefixed paths).
          touch site/.nojekyll

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Report the published URL
        run: |
          echo "Deployed to: ${{ steps.deploy.outputs.page_url }}"
          echo "Client conf url is the direct Pages origin: https://pfblockerng.github.io/pkg/<channel>/<varver>/<arch> (resolved per box by add-repo.sh)."
