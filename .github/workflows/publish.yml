name: Publish pfBlockerNG pkg repository

# Self-contained publisher for the pfBlockerNG self-hosted FreeBSD `pkg`
# repository (ADR-17). It lives in pfBlockerNG/pkg so it deploys to THIS repo's
# GitHub Pages — served at https://pfblockerng.github.io/pkg — via the same-repo
# OIDC actions/deploy-pages. No deploy key, no cross-repo secret: everything it
# needs from pfBlockerNG/pfBlockerNG (and the ports tree) is PUBLIC, used with
# this repo's own GITHUB_TOKEN.
#
# CONTENT — the union of:
#   * the current devel .pkg, built fresh here by running the SOURCE repo's own
#     scripts/build-pkg-portable.py against a checkout of its tree, so the devel
#     channel is always current with no GitHub Release cut (parity with what
#     andrebrait.github.io served). NOTE: we run the source repo's *script*, not
#     its reusable build workflow — a reusable workflow executes in the CALLER's
#     context, so its internal `actions/checkout` would grab THIS repo, not the
#     source. Running the script after an explicit `repository:` checkout avoids that.
#   * every GitHub *Release* .pkg asset of pfBlockerNG/pfBlockerNG (the durable
#     store — ADR-09/17), enumerated and downloaded each run.
# The catalog is a DERIVED, fully-regenerated index — stateless + idempotent.
#
# TRIGGERS:
#   * workflow_dispatch — manual, AND fired by pfBlockerNG/pfBlockerNG's
#     release.yml (`gh workflow run`, authenticated with the PKG_DISPATCH_TOKEN
#     PAT) so a new release publishes here within seconds.
#   * schedule — a daily backstop that also refreshes the devel build.

on:
  workflow_dispatch:
    inputs:
      build_branch_pkg:
        description: "Build the current devel .pkg and fold it in (default true)."
        type: boolean
        default: true
  schedule:
    - cron: "0 6 * * *"

# Least privilege: read to checkout + read public releases; the Pages OIDC deploy
# pair is the only elevation.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; never cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

# TARGET facts of the devel build — the pfSense the .pkg installs onto
# (CE 2.8.1 = FreeBSD 15 / py311 / php 8.3); inputs to the portable builder, not
# read from any tree. Mirror build-pkg-linux.yml's defaults.
env:
  PKG_ABI: "FreeBSD:15:amd64"
  PKG_PY_FLAVOR: "py311"
  PKG_PHP: "8.3"
  PORTS_REPO: "pfBlockerNG/FreeBSD-ports"
  PORTS_REF: "pfblockerng/use-github"

jobs:
  publish:
    name: Build devel + generate catalog + deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout the pfBlockerNG source (generator + builder + tree)
        uses: actions/checkout@v6
        with:
          repository: pfBlockerNG/pfBlockerNG
          ref: devel
          path: pfblockerng

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Ensure the zstd encoder is present
        # Both portable scripts need a zstd ENCODER (the `zstd` binary or the
        # python `zstandard` module). ubuntu-latest may not ship it — install it.
        run: command -v zstd >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y zstd; }

      - name: Build the current devel .pkg (source repo's portable builder)
        # Run the SOURCE repo's scripts/build-pkg-portable.py (single source of
        # truth — same script build-pkg-linux.yml wraps) against the checked-out
        # tree. Skipped only on a manual dispatch with build_branch_pkg unticked.
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_branch_pkg }}
        run: |
          set -eu
          mkdir -p store
          git clone --depth 1 -b "$PORTS_REF" "https://github.com/${PORTS_REPO}" "${RUNNER_TEMP}/ports"
          python3 pfblockerng/scripts/build-pkg-portable.py \
            --ports "${RUNNER_TEMP}/ports" \
            --channel devel \
            --local-src pfblockerng \
            --abi "$PKG_ABI" \
            --py-flavor "$PKG_PY_FLAVOR" \
            --php "$PKG_PHP" \
            --out store
          ls -l store

      - name: Build the current devel HEAD as a nightly .pkg (ADR-18)
        # The nightly channel is a SEPARATE package (pfSense-pkg-pfBlockerNG-nightly,
        # the -nightly port) built from the SAME devel HEAD, served from a distinct
        # nightly/ subtree. Stateless, like the devel build: one current nightly per
        # run (no GitHub pre-release store). The version is pkg-safe + monotonic —
        # <target>.YYYYMMDD.<run_number> (target = the -nightly port PORTVERSION; the
        # date dominates, run_number breaks same-day ties) — and the source commit
        # rides the annotation. Built into its OWN store so it never mixes with the
        # release catalog (file-overlap: -nightly and -devel share src/ paths).
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_branch_pkg }}
        run: |
          set -eu
          mkdir -p nightly_store
          # The ports tree was cloned by the devel build step; clone if that was skipped.
          [ -d "${RUNNER_TEMP}/ports" ] \
            || git clone --depth 1 -b "$PORTS_REF" "https://github.com/${PORTS_REPO}" "${RUNNER_TEMP}/ports"
          TARGET="$(sed -n 's/^PORTVERSION=[[:space:]]*//p' \
            "${RUNNER_TEMP}/ports/net/pfSense-pkg-pfBlockerNG-nightly/Makefile" | head -1)"
          [ -n "$TARGET" ] || { echo "::error::could not read the -nightly port PORTVERSION"; exit 1; }
          SHA="$(git -C pfblockerng rev-parse HEAD)"
          VER="${TARGET}.$(date -u +%Y%m%d).${{ github.run_number }}"
          echo "Building nightly ${VER} from devel ${SHA}"
          python3 pfblockerng/scripts/build-pkg-portable.py \
            --ports "${RUNNER_TEMP}/ports" \
            --channel nightly \
            --local-src pfblockerng \
            --abi "$PKG_ABI" \
            --py-flavor "$PKG_PY_FLAVOR" \
            --php "$PKG_PHP" \
            --pkgversion "$VER" \
            --annotate "commit=${SHA}" \
            --out nightly_store
          ls -l nightly_store

      - name: Fold in every Release .pkg asset
        # The durable store is the source repo's GitHub Releases' .pkg assets
        # (public). Enumerate ALL releases (paginated — no cap) and download each
        # one's .pkg into the same flat dir; the generator buckets by ABI from each
        # .pkg's own manifest, not the filename.
        env:
          GH_TOKEN: ${{ github.token }}
          SRC_REPO: pfBlockerNG/pfBlockerNG
        run: |
          set -eu
          mkdir -p store
          TAGS="$(gh api "repos/${SRC_REPO}/releases" --paginate --jq '.[].tag_name' || true)"
          if [ -n "$TAGS" ]; then
            printf '%s\n' "$TAGS" | while IFS= read -r TAG; do
              [ -n "$TAG" ] || continue
              echo "--- Release ${TAG}: downloading .pkg assets ---"
              gh release download "$TAG" -R "$SRC_REPO" --dir store --pattern '*.pkg' --clobber \
                || echo "  (no .pkg assets on ${TAG})"
            done
          else
            echo "No GitHub Releases in ${SRC_REPO} (devel build is the only source)."
          fi
          N="$(find store -type f -name '*.pkg' | wc -l | tr -d ' ')"
          echo "Total .pkg collected: ${N}"
          find store -type f -name '*.pkg' -exec ls -l {} \; || true
          if [ "$N" -eq 0 ]; then
            echo "::error::No .pkg to publish (devel build skipped/failed AND no releases)."
            exit 1
          fi

      - name: Generate the per-ABI catalog (pure-Python)
        # scripts/build-repo-portable.py — no libpkg, no ABI env. One <ABI>/ subtree
        # per distinct ABI (meta.conf / meta / packagesite.pkg / data.pkg + the .pkg).
        run: |
          set -eu
          python3 pfblockerng/scripts/build-repo-portable.py --in store --out site
          echo "--- Published site tree ---"
          find site -type f | sort

      - name: Generate the nightly catalog subtree (nightly/<ABI>/) — ADR-18
        # The nightly .pkg(s) get their OWN per-ABI catalog under site/nightly/, so
        # the served URL is …/pkg/nightly/${ABI} (what add-repo.sh nightly writes).
        # Deployed in the SAME Pages artifact as the release catalog (one deploy).
        # Skipped if the nightly build was skipped (no nightly .pkg to index).
        if: ${{ hashFiles('nightly_store/*.pkg') != '' }}
        run: |
          set -eu
          python3 pfblockerng/scripts/build-repo-portable.py --in nightly_store --out site/nightly
          echo "--- Published nightly subtree ---"
          find site/nightly -type f | sort

      - name: Add a human landing page (pkg ignores it)
        # Pages serves a directory; a tiny index documents the conf URL for humans.
        # pkg(8) only ever fetches <ABI>/meta.conf etc., never the root index.
        run: |
          set -eu
          {
            echo '<!doctype html><meta charset="utf-8">'
            echo '<title>pfBlockerNG pkg repository</title>'
            echo '<h1>pfBlockerNG self-hosted pkg repository</h1>'
            echo '<p>Add this repo to a pfSense box, then <code>pkg install pfSense-pkg-pfBlockerNG-devel</code>:</p>'
            echo '<pre>'
            python3 pfblockerng/scripts/build-repo-portable.py --print-conf | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
            echo '</pre>'
            echo '<p>Catalog trees (one per ABI):</p><ul>'
            for d in site/*/; do
              [ -d "$d" ] || continue
              abi="$(basename "$d")"
              [ "$abi" = nightly ] && continue   # the nightly subtree, not an ABI
              printf '<li><a href="%s/">%s</a></li>\n' "$abi" "$abi"
            done
            echo '</ul>'
            if [ -d site/nightly ]; then
              echo '<p><strong>Nightly channel</strong> (bleeding edge — the devel tip rebuilt daily):'
              echo '<code>add-repo.sh nightly</code> then <code>pkg install pfSense-pkg-pfBlockerNG-nightly</code>;'
              echo 'served from <a href="nightly/">nightly/${ABI}</a>.</p>'
            fi
          } > site/index.html
          # .nojekyll: serve the tree verbatim (no Jekyll stripping of _-prefixed paths).
          touch site/.nojekyll

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Report the published URL
        run: |
          echo "Deployed to: ${{ steps.deploy.outputs.page_url }}"
          echo "Client conf url (per ABI): https://pfblockerng.github.io/pkg/\${ABI}"
